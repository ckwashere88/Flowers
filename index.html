<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 ✿ Happy Birthday</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080510;overflow:hidden;width:100vw;height:100vh;cursor:default;user-select:none}
  canvas{position:fixed;top:0;left:0}
  .ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;display:flex;flex-direction:column;align-items:center;pointer-events:none}
  .t1{font-family:'Ma Shan Zheng',cursive;font-size:clamp(2.8rem,7vw,5.5rem);color:#ffd700;text-align:center;margin-top:2vh;opacity:0;transform:scale(0.8) translateY(-20px);animation:rc 2.5s cubic-bezier(0.16,1,0.3,1) 6s forwards;text-shadow:0 0 30px rgba(255,215,0,0.6),0 0 60px rgba(255,215,0,0.25);letter-spacing:0.12em}
  .t2{font-family:'Cormorant Garamond',serif;font-size:clamp(0.95rem,2.2vw,1.4rem);font-weight:300;font-style:italic;color:rgba(255,218,175,0.88);text-align:center;margin-top:0.8vh;opacity:0;animation:fd 2s ease 7.5s forwards;text-shadow:0 0 20px rgba(255,180,100,0.3);letter-spacing:0.22em}
  .t3{font-family:'Noto Serif SC',serif;font-size:clamp(0.8rem,1.6vw,1.05rem);font-weight:300;color:rgba(255,195,155,0.65);text-align:center;margin-top:1.5vh;opacity:0;animation:fd 2s ease 9s forwards;letter-spacing:0.3em}
  .ht{position:fixed;bottom:2vh;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(0.65rem,1.2vw,0.85rem);color:rgba(255,200,150,0.2);font-style:italic;letter-spacing:0.2em;opacity:0;animation:fi 2s ease 11s forwards;pointer-events:none}
  .cn{position:fixed;width:clamp(35px,7vw,70px);height:clamp(35px,7vw,70px);z-index:3;pointer-events:none;opacity:0;animation:fi 2s ease 10s forwards}
  .cn svg{width:100%;height:100%}
  .c1{top:10px;left:10px}.c2{top:10px;right:10px;transform:scaleX(-1)}.c3{bottom:10px;left:10px;transform:scaleY(-1)}.c4{bottom:10px;right:10px;transform:scale(-1,-1)}
  @keyframes rc{0%{opacity:0;transform:scale(0.8) translateY(-20px)}60%{opacity:1;transform:scale(1.04) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes fd{to{opacity:1;transform:translateY(0)}}
  @keyframes fi{to{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ov">
  <div class="t1">生日快乐</div>
  <div class="t2">Happy Birthday, My Love</div>
  <div class="t3">花开富贵 · 岁岁年年</div>
</div>
<div class="ht">touch anywhere to scatter gold</div>
<div class="cn c1"><svg viewBox="0 0 80 80"><path d="M2,2 L2,38 Q2,2 38,2" fill="none" stroke="rgba(255,200,100,0.35)" stroke-width="1.5"/><circle cx="4" cy="4" r="1.8" fill="rgba(255,200,100,0.3)"/></svg></div>
<div class="cn c2"><svg viewBox="0 0 80 80"><path d="M2,2 L2,38 Q2,2 38,2" fill="none" stroke="rgba(255,200,100,0.35)" stroke-width="1.5"/><circle cx="4" cy="4" r="1.8" fill="rgba(255,200,100,0.3)"/></svg></div>
<div class="cn c3"><svg viewBox="0 0 80 80"><path d="M2,2 L2,38 Q2,2 38,2" fill="none" stroke="rgba(255,200,100,0.35)" stroke-width="1.5"/><circle cx="4" cy="4" r="1.8" fill="rgba(255,200,100,0.3)"/></svg></div>
<div class="cn c4"><svg viewBox="0 0 80 80"><path d="M2,2 L2,38 Q2,2 38,2" fill="none" stroke="rgba(255,200,100,0.35)" stroke-width="1.5"/><circle cx="4" cy="4" r="1.8" fill="rgba(255,200,100,0.3)"/></svg></div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,SC;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;SC=Math.min(W,H)/900;}
resize();addEventListener('resize',resize);

const rgba=(c,a=1)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpc=(a,b,t)=>[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];
const easeOut=t=>1-Math.pow(1-t,3);

const C={
  rd1:[130,18,25],rd2:[160,28,32],rd3:[190,40,42],
  r1:[215,55,52],r2:[230,75,68],r3:[240,105,95],r4:[245,140,130],r5:[250,175,168],r6:[252,205,200],r7:[254,230,226],
  p1:[210,60,85],p2:[225,85,108],p3:[238,115,130],p4:[245,150,160],p5:[250,185,190],p6:[252,215,218],
  co1:[218,82,65],co2:[232,110,90],co3:[242,140,118],co4:[248,172,152],co5:[252,200,185],
  gd:[170,125,35],g:[245,195,70],gl:[255,222,130],gp:[255,240,195],
  gn1:[35,65,35],gn2:[48,88,45],gn3:[70,118,62],gn4:[100,148,85],
  w:[255,255,255],ww:[255,243,228],
  lb:[195,30,22],ll:[245,80,35],ld:[125,14,10],
};

// ═════════════════════════════════════
//  BACKGROUND — bokeh, warm glow, stars
// ═════════════════════════════════════
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random()*0.55,r:Math.random()*1.3+0.2,ph:Math.random()*6.28,sp:Math.random()*0.5+0.3}));

// Bokeh circles — warm out-of-focus lights
const bokeh=Array.from({length:22},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*30+15,
  color:[
    [255,180,100],[255,150,80],[255,120,60],[255,200,120],
    [255,100,80],[200,80,60],[255,160,100],[240,200,140]
  ][Math.floor(Math.random()*8)],
  alpha:Math.random()*0.04+0.01,
  ph:Math.random()*6.28,
  sp:Math.random()*0.3+0.1,
  drift:Math.random()*0.0001-0.00005,
}));

// Mini firework sparks that drift upward slowly
const ambientSparks=[];
function spawnAmbientSpark(){
  ambientSparks.push({
    x:Math.random()*W,y:H+10,
    vx:(Math.random()-0.5)*0.3,
    vy:-Math.random()*0.8-0.3,
    life:1,decay:Math.random()*0.003+0.001,
    sz:Math.random()*2+0.5,
    color:[C.g,C.gl,C.ww,[255,180,120],[255,150,100]][Math.floor(Math.random()*5)],
  });
}

// ═════════════════════════════════════
//  LANTERNS
// ═════════════════════════════════════
const lanterns=[
  {x:0.06,y:0.08,sz:24,ph:0,dl:1.5,ch:'福'},
  {x:0.94,y:0.06,sz:26,ph:2,dl:2.0,ch:'喜'},
  {x:0.20,y:0.15,sz:17,ph:4,dl:2.8,ch:''},
  {x:0.80,y:0.13,sz:18,ph:1.5,dl:3.0,ch:''},
  {x:0.03,y:0.24,sz:14,ph:3,dl:3.5,ch:''},
  {x:0.97,y:0.22,sz:15,ph:5,dl:3.8,ch:''},
  {x:0.50,y:0.04,sz:20,ph:0.5,dl:2.3,ch:'寿'},
  {x:0.35,y:0.08,sz:13,ph:1,dl:4.0,ch:''},
  {x:0.65,y:0.07,sz:14,ph:3.5,dl:3.6,ch:''},
].map(l=>({...l,dx:(Math.random()-0.5)*0.00005,bob:Math.random()*0.28+0.22,ba:Math.random()*5+4,gp:Math.random()*6.28,sw:Math.random()*6.28}));

function drawLantern(x,y,sz,glow,alpha,ch){
  ctx.save();ctx.translate(x,y);ctx.globalAlpha=alpha;
  const bw=sz*0.7,bh=sz*1.1;
  const gr=sz*4.5;const gg=ctx.createRadialGradient(0,0,sz*0.2,0,0,gr);
  gg.addColorStop(0,`rgba(255,75,22,${0.2*glow})`);gg.addColorStop(0.3,`rgba(255,45,12,${0.07*glow})`);gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.fillRect(-gr,-gr,gr*2,gr*2);
  ctx.beginPath();ctx.moveTo(0,-bh-sz*0.3);ctx.lineTo(0,-bh);ctx.strokeStyle=rgba(C.gd,0.35);ctx.lineWidth=0.6;ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,-bh,bw*0.35,sz*0.12,0,0,Math.PI*2);
  const tc=ctx.createLinearGradient(-bw*0.35,-bh,bw*0.35,-bh);
  tc.addColorStop(0,rgba(C.gd,0.7));tc.addColorStop(0.4,rgba(C.gl,0.82));tc.addColorStop(1,rgba(C.gd,0.7));
  ctx.fillStyle=tc;ctx.fill();
  ctx.beginPath();ctx.arc(0,-bh-sz*0.09,sz*0.05,0,Math.PI*2);ctx.strokeStyle=rgba(C.g,0.5);ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-bw*0.3,-bh);ctx.bezierCurveTo(-bw*0.92,-bh*0.55,-bw,-bh*-0.15,-bw*0.85,bh*0.5);
  ctx.bezierCurveTo(-bw*0.68,bh*0.88,-bw*0.3,bh,0,bh);ctx.bezierCurveTo(bw*0.3,bh,bw*0.68,bh*0.88,bw*0.85,bh*0.5);
  ctx.bezierCurveTo(bw,-bh*-0.15,bw*0.92,-bh*0.55,bw*0.3,-bh);ctx.closePath();
  const bg=ctx.createRadialGradient(-bw*0.1,-bh*0.1,0,0,0,bh*1.1);
  bg.addColorStop(0,rgba(C.ll,0.95));bg.addColorStop(0.3,rgba(C.lb,0.93));bg.addColorStop(0.65,rgba(C.rd1,0.9));bg.addColorStop(1,rgba(C.ld,0.85));
  ctx.fillStyle=bg;ctx.fill();
  const ig=ctx.createRadialGradient(0,-bh*0.05,0,0,0,bw*0.6);
  ig.addColorStop(0,`rgba(255,190,65,${0.26*glow})`);ig.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(0,0,bw*0.6,bh*0.5,0,0,Math.PI*2);ctx.fill();
  for(let i=-2;i<=2;i++){const ry=i*bh*0.22;ctx.beginPath();ctx.moveTo(-bw*(0.85-Math.abs(i)*0.1),ry);ctx.quadraticCurveTo(0,ry+1.5,bw*(0.85-Math.abs(i)*0.1),ry);ctx.strokeStyle=`rgba(150,20,10,${0.2-Math.abs(i)*0.03})`;ctx.lineWidth=0.5;ctx.stroke();}
  ctx.beginPath();ctx.ellipse(0,-bh*0.82,bw*0.55,sz*0.04,0,0,Math.PI*2);ctx.fillStyle=rgba(C.g,0.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,bh*0.85,bw*0.5,sz*0.035,0,0,Math.PI*2);ctx.fillStyle=rgba(C.g,0.22);ctx.fill();
  if(ch){ctx.font=`${sz*0.68}px 'Ma Shan Zheng',cursive`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(255,190,65,0.4)';ctx.shadowBlur=8;ctx.fillStyle=rgba(C.gl,0.6*glow);ctx.fillText(ch,0,-bh*0.02);ctx.shadowBlur=0;}
  ctx.beginPath();ctx.ellipse(0,bh,bw*0.3,sz*0.08,0,0,Math.PI*2);
  const bc2=ctx.createLinearGradient(-bw*0.3,bh,bw*0.3,bh);bc2.addColorStop(0,rgba(C.gd,0.6));bc2.addColorStop(0.5,rgba(C.gl,0.7));bc2.addColorStop(1,rgba(C.gd,0.6));
  ctx.fillStyle=bc2;ctx.fill();
  const tt=bh*1.08;ctx.beginPath();ctx.arc(0,tt,sz*0.03,0,Math.PI*2);ctx.fillStyle=rgba(C.g,0.5);ctx.fill();
  for(let i=0;i<5;i++){const a=((i/4)-0.5)*0.5,ex=Math.sin(a)*sz*0.2,ey=tt+sz*0.38;ctx.beginPath();ctx.moveTo(0,tt);ctx.quadraticCurveTo(ex*0.3,tt+sz*0.15,ex,ey);ctx.strokeStyle=rgba(C.g,0.3);ctx.lineWidth=0.5;ctx.stroke();}
  ctx.globalAlpha=1;ctx.restore();
}

// ═════════════════════════════════════
//  ORNAMENTAL VASE — lower position
// ═════════════════════════════════════
function drawVase(prog){
  const sp=Math.min(prog*2.2,1);if(sp<0.15)return;
  const vp=easeOut(Math.min((sp-0.15)/0.6,1));if(vp<=0)return;
  const cx=W/2;
  // LOWERED position
  const vTop=H*0.62,vBot=H*0.90;
  const vH=(vBot-vTop)*vp;
  const mW=48*vp*SC,beW=62*vp*SC,baW=32*vp*SC;
  const beY=vTop+vH*0.55,nkY=vTop+vH*0.15;

  ctx.save();ctx.globalAlpha=vp;

  // Shadow
  ctx.beginPath();ctx.ellipse(cx+3,vBot+5*vp,baW*1.3,7*vp,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();

  // Main body
  ctx.beginPath();
  ctx.moveTo(cx-mW,vTop);
  ctx.bezierCurveTo(cx-mW*0.95,nkY,cx-mW*0.85,nkY,cx-mW*0.82,nkY);
  ctx.bezierCurveTo(cx-beW*1.15,nkY+vH*0.15,cx-beW*1.1,beY-vH*0.1,cx-beW,beY);
  ctx.bezierCurveTo(cx-beW*0.9,beY+vH*0.2,cx-baW*1.3,vBot-vH*0.08,cx-baW,vBot);
  ctx.lineTo(cx+baW,vBot);
  ctx.bezierCurveTo(cx+baW*1.3,vBot-vH*0.08,cx+beW*0.9,beY+vH*0.2,cx+beW,beY);
  ctx.bezierCurveTo(cx+beW*1.1,beY-vH*0.1,cx+beW*1.15,nkY+vH*0.15,cx+mW*0.82,nkY);
  ctx.bezierCurveTo(cx+mW*0.85,nkY,cx+mW*0.95,nkY,cx+mW,vTop);
  ctx.closePath();

  const vg=ctx.createLinearGradient(cx-beW,0,cx+beW,0);
  vg.addColorStop(0,'rgba(108,15,12,0.92)');vg.addColorStop(0.15,'rgba(148,23,18,0.95)');
  vg.addColorStop(0.35,'rgba(185,33,26,0.97)');vg.addColorStop(0.48,'rgba(202,40,32,0.98)');
  vg.addColorStop(0.55,'rgba(215,55,42,0.97)');vg.addColorStop(0.7,'rgba(185,33,26,0.97)');
  vg.addColorStop(0.85,'rgba(148,23,18,0.95)');vg.addColorStop(1,'rgba(108,15,12,0.92)');
  ctx.fillStyle=vg;ctx.fill();

  // 3D highlight
  const hl=ctx.createLinearGradient(cx-beW*0.05,0,cx+beW*0.35,0);
  hl.addColorStop(0,'rgba(255,255,255,0)');hl.addColorStop(0.3,'rgba(255,200,180,0.08)');
  hl.addColorStop(0.5,'rgba(255,225,210,0.13)');hl.addColorStop(0.7,'rgba(255,200,180,0.06)');
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;ctx.fill();

  // Gold rim
  ctx.beginPath();ctx.ellipse(cx,vTop,mW+3*vp,5*vp,0,0,Math.PI*2);
  const rmg=ctx.createLinearGradient(cx-mW,vTop,cx+mW,vTop);
  rmg.addColorStop(0,rgba(C.gd,0.6));rmg.addColorStop(0.3,rgba(C.gl,0.82));rmg.addColorStop(0.5,rgba(C.gp,0.88));
  rmg.addColorStop(0.7,rgba(C.gl,0.82));rmg.addColorStop(1,rgba(C.gd,0.6));
  ctx.fillStyle=rmg;ctx.fill();

  // Inner mouth
  ctx.beginPath();ctx.ellipse(cx,vTop+2*vp,mW-2*vp,3.5*vp,0,0,Math.PI*2);ctx.fillStyle='rgba(55,6,5,0.75)';ctx.fill();

  // Gold neck band
  const bandY=nkY+2*vp,bandW=mW*0.84;
  ctx.beginPath();ctx.moveTo(cx-bandW,bandY-2*vp);ctx.quadraticCurveTo(cx,bandY-4*vp,cx+bandW,bandY-2*vp);
  ctx.lineTo(cx+bandW,bandY+2*vp);ctx.quadraticCurveTo(cx,bandY+4*vp,cx-bandW,bandY+2*vp);ctx.closePath();
  const bg1=ctx.createLinearGradient(cx-bandW,bandY,cx+bandW,bandY);
  bg1.addColorStop(0,rgba(C.gd,0.45));bg1.addColorStop(0.3,rgba(C.gl,0.62));bg1.addColorStop(0.5,rgba(C.gp,0.68));
  bg1.addColorStop(0.7,rgba(C.gl,0.62));bg1.addColorStop(1,rgba(C.gd,0.45));
  ctx.fillStyle=bg1;ctx.fill();

  // Decorative belly band
  const dbY=beY-vH*0.02,dbW=beW*0.98,dbH=vH*0.18;
  ctx.beginPath();ctx.moveTo(cx-dbW,dbY-dbH/2);ctx.quadraticCurveTo(cx,dbY-dbH/2-3*vp,cx+dbW,dbY-dbH/2);
  ctx.lineTo(cx+dbW,dbY+dbH/2);ctx.quadraticCurveTo(cx,dbY+dbH/2+3*vp,cx-dbW,dbY+dbH/2);ctx.closePath();
  ctx.fillStyle='rgba(135,18,14,0.4)';ctx.fill();
  for(const dy of[-dbH/2,dbH/2]){ctx.beginPath();ctx.moveTo(cx-dbW,dbY+dy);ctx.quadraticCurveTo(cx,dbY+dy+(dy<0?-2:2)*vp,cx+dbW,dbY+dy);ctx.strokeStyle=rgba(C.g,0.35);ctx.lineWidth=1;ctx.stroke();}

  // Ruyi motifs
  for(let i=0;i<5;i++){
    const t=(i+0.5)/5;const px=cx-dbW*0.85+t*dbW*1.7,py=dbY,ps=7*vp;
    ctx.beginPath();ctx.arc(px,py,ps,Math.PI,0);
    ctx.bezierCurveTo(px+ps,py+ps*0.4,px+ps*0.3,py+ps*0.5,px,py+ps*0.3);
    ctx.bezierCurveTo(px-ps*0.3,py+ps*0.5,px-ps,py+ps*0.4,px-ps,py);
    ctx.strokeStyle=rgba(C.g,0.3);ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();ctx.arc(px,py-ps*0.3,1.2*vp,0,Math.PI*2);ctx.fillStyle=rgba(C.g,0.3);ctx.fill();
  }

  // Base band
  ctx.beginPath();ctx.moveTo(cx-baW-2*vp,vBot-3*vp);ctx.quadraticCurveTo(cx,vBot-6*vp,cx+baW+2*vp,vBot-3*vp);
  ctx.lineTo(cx+baW+2*vp,vBot+1*vp);ctx.quadraticCurveTo(cx,vBot+3*vp,cx-baW-2*vp,vBot+1*vp);ctx.closePath();
  const bg2=ctx.createLinearGradient(cx-baW,vBot,cx+baW,vBot);
  bg2.addColorStop(0,rgba(C.gd,0.4));bg2.addColorStop(0.5,rgba(C.gl,0.55));bg2.addColorStop(1,rgba(C.gd,0.4));
  ctx.fillStyle=bg2;ctx.fill();

  // Foot
  ctx.beginPath();ctx.moveTo(cx-baW*0.9,vBot);ctx.lineTo(cx-baW*1.05,vBot+6*vp);
  ctx.quadraticCurveTo(cx,vBot+9*vp,cx+baW*1.05,vBot+6*vp);ctx.lineTo(cx+baW*0.9,vBot);
  const fg=ctx.createLinearGradient(cx-baW,0,cx+baW,0);
  fg.addColorStop(0,'rgba(95,12,8,0.8)');fg.addColorStop(0.5,'rgba(155,24,18,0.85)');fg.addColorStop(1,'rgba(95,12,8,0.8)');
  ctx.fillStyle=fg;ctx.fill();

  ctx.globalAlpha=1;ctx.restore();
}

// ═════════════════════════════════════
//  FULLER SOFT PETAL — rounder, wider
// ═════════════════════════════════════
function drawSoftPetal(x,y,w,h,angle,baseCol,tipCol,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.globalAlpha=alpha;

  // Even rounder, wider petal
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.bezierCurveTo(-w*0.7,-h*0.12,-w*0.85,-h*0.55,-w*0.25,-h*0.92);
  ctx.quadraticCurveTo(0,-h*1.08,w*0.25,-h*0.92);
  ctx.bezierCurveTo(w*0.85,-h*0.55,w*0.7,-h*0.12,0,0);
  ctx.closePath();

  const g=ctx.createLinearGradient(0,0,0,-h);
  const mid=lerpc(baseCol,tipCol,0.35);
  g.addColorStop(0,rgba(baseCol,1));g.addColorStop(0.3,rgba(mid,0.93));
  g.addColorStop(0.65,rgba(tipCol,0.82));g.addColorStop(1,rgba(tipCol,0.55));
  ctx.fillStyle=g;ctx.fill();

  // Soft highlight on right side for roundness
  ctx.beginPath();ctx.moveTo(w*0.1,-h*0.2);
  ctx.quadraticCurveTo(w*0.3,-h*0.5,w*0.1,-h*0.8);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1.5;ctx.stroke();

  // Shadow on left
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.bezierCurveTo(-w*0.7,-h*0.12,-w*0.85,-h*0.55,-w*0.25,-h*0.92);
  ctx.strokeStyle=`rgba(${Math.max(baseCol[0]-45,0)},${Math.max(baseCol[1]-18,0)},${Math.max(baseCol[2]-12,0)},0.1)`;
  ctx.lineWidth=0.7;ctx.stroke();

  ctx.globalAlpha=1;ctx.restore();
}

// ═════════════════════════════════════
//  PEONY — MUCH FULLER (more layers, more petals)
// ═════════════════════════════════════
function drawPeony(fcx,fcy,radius,bloom,colorIdx){
  if(bloom<=0)return;
  const ep=easeOut(bloom);

  const palettes=[
    {layers:[C.rd2,C.rd3,C.r1,C.r2,C.r3,C.r4,C.r5,C.r6,C.r7],tips:[C.rd3,C.r1,C.r2,C.r3,C.r4,C.r5,C.r6,C.r7,[254,238,234]]},
    {layers:[C.p1,C.p1,C.p2,C.p3,C.p4,C.p5,C.p6,[252,225,228],[253,238,240]],tips:[C.p2,C.p2,C.p3,C.p4,C.p5,C.p6,[252,225,228],[253,238,240],[254,245,246]]},
    {layers:[C.co1,C.co1,C.co2,C.co3,C.co4,C.co5,[252,215,200],[254,232,220],[255,242,234]],tips:[C.co2,C.co2,C.co3,C.co4,C.co5,[252,215,200],[254,232,220],[255,242,234],[255,248,242]]},
  ];
  const pal=palettes[colorIdx%3];

  // Glow
  const gr=radius*2.8*ep;
  const gl=ctx.createRadialGradient(fcx,fcy,0,fcx,fcy,gr);
  gl.addColorStop(0,`rgba(${pal.layers[3][0]},${pal.layers[3][1]},${pal.layers[3][2]},${0.14*ep})`);
  gl.addColorStop(0.5,`rgba(${pal.layers[3][0]},${pal.layers[3][1]},${pal.layers[3][2]},${0.04*ep})`);
  gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(fcx,fcy,gr,0,Math.PI*2);ctx.fill();

  // 8 LAYERS for fullness
  const layerDefs=[
    {n:10, rF:1.0,  hF:1.0,  wF:0.5,  s:0,    ci:0},
    {n:10, rF:0.85, hF:0.92, wF:0.48, s:0.04, ci:1},
    {n:9,  rF:0.70, hF:0.82, wF:0.46, s:0.10, ci:2},
    {n:8,  rF:0.56, hF:0.72, wF:0.44, s:0.18, ci:3},
    {n:7,  rF:0.43, hF:0.62, wF:0.42, s:0.28, ci:4},
    {n:6,  rF:0.30, hF:0.52, wF:0.40, s:0.38, ci:5},
    {n:5,  rF:0.18, hF:0.42, wF:0.38, s:0.50, ci:6},
    {n:4,  rF:0.08, hF:0.32, wF:0.36, s:0.62, ci:7},
  ];

  for(const L of layerDefs){
    const lp=Math.max(0,Math.min((bloom-L.s)/(1-L.s),1));
    if(lp<=0)continue;
    const elp=easeOut(lp);
    const dist=radius*L.rF*elp;
    const pH=radius*L.hF*elp;
    const pW=radius*L.wF*elp;
    const col=pal.layers[Math.min(L.ci,pal.layers.length-1)];
    const tip=pal.tips[Math.min(L.ci,pal.tips.length-1)];

    for(let i=0;i<L.n;i++){
      const angle=(i/L.n)*Math.PI*2+L.ci*0.38-Math.PI/2;
      const px=fcx+Math.cos(angle)*dist;
      const py=fcy+Math.sin(angle)*dist;
      drawSoftPetal(px,py,pW,pH,angle+Math.PI/2,col,tip,(0.82+L.ci*0.02)*elp);
    }
  }

  // Golden center
  if(bloom>0.5){
    const cp=easeOut(Math.min((bloom-0.5)/0.5,1));
    const cr=radius*0.2*cp;
    const cg=ctx.createRadialGradient(fcx,fcy,0,fcx,fcy,cr);
    cg.addColorStop(0,rgba(C.gl,0.92*cp));cg.addColorStop(0.4,rgba(C.g,0.6*cp));cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(fcx,fcy,cr,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
    for(let i=0;i<10;i++){
      const sa=(i/10)*Math.PI*2+0.2;const sr=cr*0.6;
      ctx.beginPath();ctx.arc(fcx+Math.cos(sa)*sr,fcy+Math.sin(sa)*sr,1.3*cp,0,Math.PI*2);
      ctx.fillStyle=rgba(C.g,0.7*cp);ctx.fill();
    }
  }
}

//  BUD
// ═════════════════════════════════════
function drawBud(fcx,fcy,radius,bloom,ci){
  if(bloom<=0)return;const ep=easeOut(bloom);
  const pals=[{c:C.rd3,t:C.r4},{c:C.p2,t:C.p4},{c:C.co2,t:C.co4}];
  const p=pals[ci%3];
  for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+Math.PI*0.6;const sh=radius*0.85*ep;
    ctx.save();ctx.translate(fcx,fcy);ctx.rotate(a);ctx.globalAlpha=ep*0.55;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-radius*0.18,sh*0.3,-radius*0.12,sh*0.7,0,sh);
    ctx.bezierCurveTo(radius*0.12,sh*0.7,radius*0.18,sh*0.3,0,0);
    const sg=ctx.createLinearGradient(0,0,0,sh);sg.addColorStop(0,rgba(C.gn1,0.8));sg.addColorStop(1,rgba(C.gn3,0.45));
    ctx.fillStyle=sg;ctx.fill();ctx.globalAlpha=1;ctx.restore();}
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2-Math.PI/2;
    drawSoftPetal(fcx+Math.cos(a)*2*ep,fcy+Math.sin(a)*2*ep,radius*0.4*ep,radius*0.85*ep,a+Math.PI/2,p.c,p.t,0.85*ep);}
  if(bloom>0.4){const bp=easeOut(Math.min((bloom-0.4)/0.6,1));
    for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+0.4;
      drawSoftPetal(fcx+Math.cos(a)*1.5*bp,fcy+Math.sin(a)*1.5*bp,radius*0.3*bp,radius*0.6*bp,a+Math.PI/2,p.t,[Math.min(p.t[0]+30,255),Math.min(p.t[1]+25,255),Math.min(p.t[2]+25,255)],0.8*bp);}}
}

function drawBreath(fcx,fcy,radius,bloom){
  if(bloom<=0)return;const ep=easeOut(bloom);
  let s=Math.floor(fcx*7+fcy*3);const rng=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  for(let i=0;i<10;i++){const a=rng()*6.28,d=radius*(0.3+rng()*0.7);
    const bx=fcx+Math.cos(a)*d*ep,by=fcy+Math.sin(a)*d*ep,r=1+rng()*1.5;
    ctx.beginPath();ctx.moveTo(fcx,fcy);ctx.lineTo(bx,by);ctx.strokeStyle=rgba(C.gn3,0.15*ep);ctx.lineWidth=0.3;ctx.stroke();
    ctx.beginPath();ctx.arc(bx,by,r*ep,0,Math.PI*2);ctx.fillStyle=rgba(rng()>0.5?C.ww:C.r6,0.5*ep);ctx.fill();}}

function drawGreenery(fcx,fcy,radius,bloom){
  if(bloom<=0)return;const ep=easeOut(bloom);
  let s=Math.floor(fcx*11+fcy*7);const rng=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  for(let i=0;i<2+Math.floor(rng()*2);i++){const a=(rng()-0.5)*1.6-Math.PI/2,len=radius*(0.8+rng()*0.5)*ep,w=radius*0.14;
    ctx.save();ctx.translate(fcx,fcy);ctx.rotate(a);ctx.globalAlpha=ep*0.6;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-w,-len*0.3,-w*0.5,-len*0.75,0,-len);
    ctx.bezierCurveTo(w*0.5,-len*0.75,w,-len*0.3,0,0);
    const lg=ctx.createLinearGradient(0,0,0,-len);lg.addColorStop(0,rgba(C.gn1,0.85));lg.addColorStop(1,rgba(C.gn3,0.45));
    ctx.fillStyle=lg;ctx.fill();ctx.globalAlpha=1;ctx.restore();}}

// ═════════════════════════════════════
//  STEMS
// ═════════════════════════════════════
function drawStems(prog){
  const sp=Math.min(prog*2,1),ep=easeOut(sp);
  const cx=W/2,mouthY=H*0.62,bcy=H*0.50;
  flowers.forEach(f=>{
    if(f.type==='breath'||f.type==='green')return;
    const fcx=cx+f.ox*W*0.42,fcy=bcy+f.oy*H*0.45;
    const delay=f.dl*0.08,stp=easeOut(Math.max(0,Math.min((sp-delay)/(1-delay),1)));
    if(stp<=0)return;
    const curTop=mouthY-(mouthY-fcy)*stp;
    ctx.beginPath();ctx.moveTo(cx+(fcx-cx)*0.12,mouthY);
    ctx.bezierCurveTo(cx+(fcx-cx)*0.25,mouthY-(mouthY-fcy)*0.2,fcx,mouthY-(mouthY-fcy)*0.65,fcx,curTop);
    ctx.strokeStyle=rgba(C.gn2,stp*0.65);ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    if(f.r>=38&&stp>0.6){const lp=easeOut(Math.min((stp-0.6)/0.35,1));
      const lx=lerp(cx+(fcx-cx)*0.12,fcx,0.5),ly=lerp(mouthY,fcy,0.5);
      drawLeaf(lx,ly,f.ox<0?-1:1,lp);}
  });
}
function drawLeaf(x,y,dir,prog){
  const ep=easeOut(prog),sz=18*ep*SC;
  ctx.save();ctx.translate(x,y);ctx.scale(dir,1);ctx.rotate(-0.4+(1-ep)*0.3);ctx.globalAlpha=ep*0.65;
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(sz*0.25,-sz*0.28,sz*0.75,-sz*0.15,sz,0);
  ctx.bezierCurveTo(sz*0.75,sz*0.13,sz*0.25,sz*0.22,0,0);ctx.closePath();
  const lg=ctx.createLinearGradient(0,0,sz,0);lg.addColorStop(0,rgba(C.gn1));lg.addColorStop(1,rgba(C.gn3,0.7));
  ctx.fillStyle=lg;ctx.fill();ctx.globalAlpha=1;ctx.restore();
}

//  PETALS / SPARKLES
// ═════════════════════════════════════
const fallingPetals=[];
function spawnPetal(x,y,burst=false){
  const colors=[C.r2,C.r4,C.r5,C.r6,C.p3,C.p5,C.co3,C.co5];
  fallingPetals.push({x:x??Math.random()*W,y:y??-15,vx:burst?(Math.random()-0.5)*4:(Math.random()-0.5)*0.45,vy:burst?(Math.random()-0.5)*3:Math.random()*0.45+0.18,rot:Math.random()*6.28,rs:(Math.random()-0.5)*0.02,w:Math.random()*6+4,h:Math.random()*8+5,col:colors[Math.floor(Math.random()*colors.length)],al:Math.random()*0.32+0.18,wp:Math.random()*6.28,ws:Math.random()*0.01+0.004,wa:Math.random()*0.3+0.12,dp:Math.random()});}
setInterval(()=>{if(fallingPetals.length<90)spawnPetal();},350);

const sparkles=[];
function burstS(x,y,n=32){for(let i=0;i<n;i++){const a=Math.random()*6.28,sp=Math.random()*4.5+1.5;
  const cols=[C.g,C.gl,C.ww,C.gp,C.r5,[255,180,120]];
  sparkles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,decay:Math.random()*0.009+0.004,sz:Math.random()*3+1.5,col:cols[Math.floor(Math.random()*cols.length)],star:Math.random()>0.5});}}

const goldP=Array.from({length:50},()=>({x:Math.random()*3000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.08,vy:-Math.random()*0.18-0.04,sz:Math.random()*1.5+0.3,ph:Math.random()*6.28,sp:Math.random()*0.2+0.1,life:Math.random()}));

function interact(x,y){burstS(x,y,30);for(let i=0;i<12;i++)spawnPetal(x+(Math.random()-0.5)*60,y+(Math.random()-0.5)*60,true);}
cv.addEventListener('click',e=>interact(e.clientX,e.clientY));
cv.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.touches)interact(t.clientX,t.clientY);},{passive:false});
let lastT=0;cv.addEventListener('mousemove',e=>{const n=Date.now();if(n-lastT>100){if(Math.random()>0.35)spawnPetal(e.clientX,e.clientY);lastT=n;}});

// ═════════════════════════════════════
//  RENDER
// ═════════════════════════════════════
let startTime=null;const BLOOM_DUR=5500;

function render(ts){
  if(!startTime)startTime=ts;
  const elapsed=ts-startTime,time=ts*0.001;
  const mp=Math.min(elapsed/BLOOM_DUR,1);

  ctx.clearRect(0,0,W,H);

  // ── VIBRANT SKY ──
  const sky=ctx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.5,H*0.85);
  sky.addColorStop(0,'#12081e');
  sky.addColorStop(0.3,'#0e0618');
  sky.addColorStop(0.6,'#0a0414');
  sky.addColorStop(1,'#060310');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Warm color wash — top corners
  const wash1=ctx.createRadialGradient(0,0,0,0,0,H*0.6);
  wash1.addColorStop(0,`rgba(120,30,50,${0.06+Math.sin(time*0.2)*0.015})`);
  wash1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wash1;ctx.fillRect(0,0,W,H);

  const wash2=ctx.createRadialGradient(W,0,0,W,0,H*0.6);
  wash2.addColorStop(0,`rgba(100,40,20,${0.05+Math.cos(time*0.15)*0.012})`);
  wash2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wash2;ctx.fillRect(0,0,W,H);

  // Bottom warm glow
  const wash3=ctx.createRadialGradient(W/2,H,0,W/2,H,H*0.5);
  wash3.addColorStop(0,`rgba(80,15,25,${0.08+Math.sin(time*0.3)*0.02})`);
  wash3.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wash3;ctx.fillRect(0,0,W,H);

  // Bouquet warm glow
  const bGlow=ctx.createRadialGradient(W/2,H*0.50,0,W/2,H*0.50,H*0.35);
  bGlow.addColorStop(0,`rgba(180,40,30,${0.08*mp})`);
  bGlow.addColorStop(0.4,`rgba(140,25,20,${0.04*mp})`);
  bGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bGlow;ctx.fillRect(0,0,W,H);

  // ── Bokeh circles ──
  for(const b of bokeh){
    b.ph+=b.sp*0.008;b.x+=b.drift;
    if(b.x<-0.1)b.x=1.1;if(b.x>1.1)b.x=-0.1;
    const ba=b.alpha*(0.7+Math.sin(b.ph)*0.3);
    const bg=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*SC);
    bg.addColorStop(0,`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${ba*1.5})`);
    bg.addColorStop(0.4,`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${ba*0.6})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(b.x*W,b.y*H,b.r*SC,0,Math.PI*2);ctx.fill();
    // Ring edge
    ctx.beginPath();ctx.arc(b.x*W,b.y*H,b.r*SC*0.9,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${ba*0.5})`;
    ctx.lineWidth=0.5;ctx.stroke();
  }

  // Stars
  for(const s of stars){s.ph+=s.sp*0.011;const a=0.25+Math.sin(s.ph)*0.35+0.35;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,248,235,${a})`;ctx.fill();}

  // Ambient sparks
  if(Math.random()<0.08)spawnAmbientSpark();
  for(let i=ambientSparks.length-1;i>=0;i--){
    const a=ambientSparks[i];a.x+=a.vx;a.y+=a.vy;a.life-=a.decay;
    if(a.life<=0||a.y<-20){ambientSparks.splice(i,1);continue;}
    const ag=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.sz+2);
    ag.addColorStop(0,rgba(a.color,a.life*0.5));ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(a.x,a.y,a.sz+2,0,Math.PI*2);ctx.fill();
  }

  // Gold particles
  for(const g of goldP){g.ph+=g.sp*0.01;g.x+=g.vx+Math.sin(g.ph)*0.05;g.y+=g.vy;g.life-=0.0005;
    if(g.y<-10||g.life<=0){g.x=Math.random()*W;g.y=H+10;g.life=1;}
    const ga=g.life*(0.2+Math.sin(g.ph)*0.1);const gg=ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.sz+2);
    gg.addColorStop(0,rgba(C.g,ga));gg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(g.x,g.y,g.sz+2,0,Math.PI*2);ctx.fill();}

  // Lanterns
  for(const l of lanterns){const la=Math.min((elapsed/1000-l.dl)/2.5,1);if(la<=0)continue;l.x+=l.dx;l.sw+=0.006;
    if(l.x<-0.12)l.x=1.12;if(l.x>1.12)l.x=-0.12;l.gp+=0.01;
    const bob=Math.sin(time*l.bob+l.ph)*l.ba;const sway=Math.sin(l.sw)*2;
    drawLantern(l.x*W+sway,l.y*H+bob,l.sz,0.6+Math.sin(l.gp)*0.4,easeOut(la),l.ch);}

  // Stems
  drawStems(mp);

  // Vase
  drawVase(mp);

  // Flowers
  const bcx=W/2,bcy=H*0.50;
  const sorted=[...flowers.entries()].sort((a,b)=>a[1].z-b[1].z);
  for(const [idx,f] of sorted){
    const fcx=bcx+f.ox*W*0.42,fcy=bcy+f.oy*H*0.45;
    const fp=Math.max(0,Math.min((mp-f.dl*0.1)/(1-f.dl*0.1),1));
    const bloom=Math.max(0,(fp-0.25)/0.75);
    const r=f.r*SC;

    if(f.type==='peony')drawPeony(fcx,fcy,r,bloom,f.ci);
    else if(f.type==='bud')drawBud(fcx,fcy,r,bloom,f.ci);
    else if(f.type==='breath')drawBreath(fcx,fcy,r,bloom);
    else if(f.type==='green')drawGreenery(fcx,fcy,r,bloom);
  }

  // Falling petals
  for(let i=fallingPetals.length-1;i>=0;i--){
    const p=fallingPetals[i];p.wp+=p.ws;const dm=0.55+p.dp*0.45;
    p.x+=(p.vx+Math.sin(p.wp)*p.wa)*dm;p.y+=p.vy*dm;p.vy+=0.001;p.rot+=p.rs;p.vx+=Math.sin(time*0.2)*0.001;
    if(p.y>H+25||p.x<-25||p.x>W+25){fallingPetals.splice(i,1);continue;}
    const tip=[Math.min(p.col[0]+45,255),Math.min(p.col[1]+35,255),Math.min(p.col[2]+35,255)];
    drawSoftPetal(p.x,p.y,p.w*dm,p.h*dm,p.rot,p.col,tip,p.al*dm);
  }

  // Sparkles
  for(let i=sparkles.length-1;i>=0;i--){
    const s=sparkles[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.035;s.vx*=0.99;s.life-=s.decay;
    if(s.life<=0){sparkles.splice(i,1);continue;}
    if(s.star){ctx.save();ctx.translate(s.x,s.y);ctx.rotate(ts*0.002);ctx.globalAlpha=s.life;const r=s.sz*s.life*2.2;
      for(let j=0;j<4;j++){ctx.rotate(Math.PI/2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-r*0.1,-r);ctx.lineTo(0,-r*1.1);ctx.lineTo(r*0.1,-r);ctx.closePath();ctx.fillStyle=rgba(s.col,s.life*0.5);ctx.fill();}
      ctx.globalAlpha=1;ctx.restore();}
    else{const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*s.life+3.5);sg.addColorStop(0,rgba(s.col,s.life));sg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(s.x,s.y,s.sz*s.life+3.5,0,Math.PI*2);ctx.fill();}
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
